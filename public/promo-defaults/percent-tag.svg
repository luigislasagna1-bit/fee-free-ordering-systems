<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 288" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
  </defs>
  <rect width="576" height="288" fill="url(#g)"/>
  <!-- Sparkles -->
  <g fill="#fff" opacity="0.4">
    <circle cx="80" cy="50" r="2"/>
    <circle cx="120" cy="220" r="1.5"/>
    <circle cx="500" cy="240" r="2.5"/>
    <circle cx="540" cy="60" r="2"/>
    <circle cx="200" cy="40" r="1.5"/>
    <circle cx="430" cy="200" r="2"/>
  </g>
  <!-- Big percent sign -->
  <text x="460" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="180" font-weight="900" fill="#fff" opacity="0.18" text-anchor="middle">%</text>
  <text x="460" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="180" font-weight="900" fill="none" stroke="#fff" stroke-width="3" text-anchor="middle">%</text>
  <!-- Foreground text -->
  <text x="60" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="900" fill="#fff" letter-spacing="-1">SAVE</text>
  <text x="60" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="900" fill="#a7f3d0" letter-spacing="-1">BIG</text>
  <text x="60" y="232" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#d1fae5" letter-spacing="2">LIMITED TIME</text>
