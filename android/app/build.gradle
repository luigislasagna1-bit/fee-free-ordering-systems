apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

// Release signing — load the upload key from keystore.properties (gitignored).
// When absent (clean checkout / CI without the key), release builds fall back to
// debug signing so the project still builds. 2026-06-18: this was MISSING, so
// `bundleRelease` produced an UNSIGNED .aab that the Play Console rejects.
def keystorePropsFile = rootProject.file("keystore.properties")
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystoreProps.load(new FileInputStream(keystorePropsFile))
}

android {
    namespace = "com.feefreeordering.kitchen"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.feefreeordering.kitchen"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 14
        versionName "2.3"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (keystorePropsFile.exists()) {
                storeFile file("feefree-release.jks")
                storePassword keystoreProps['storePassword']
                keyAlias keystoreProps['keyAlias']
                keyPassword keystoreProps['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig keystorePropsFile.exists() ? signingConfigs.release : signingConfigs.debug
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    // Star Micronics StarIO SDK — gives us native Star Line Mode +
    // ESC/POS support so the printer works regardless of which
    // emulation it ships in. This is what GloriaFood and Square use
    // under the hood for Star receipt printers. Without this we have
    // to ask restaurants to manually switch their printer's emulation
    // mode via Star's PC utility — non-starter for our launch UX.
    //
    // Maven Central: com.starmicronics:stario:2.13.0
    // Supports: TSP143III/IV, TSP100ECO, TSP650II, TSP700II, TSP800II,
    //           mC-Print2/3, mPOP, SM-S210i, BSC10II, and more
    implementation 'com.starmicronics:stario:2.13.0'
    implementation 'com.starmicronics:starioextension:1.17.0'
    // StarXpand SDK (stario10) — Star's MODERN recommended SDK.
    // Classic stario was exhaustively tested and proven non-functional
    // for this printer. stario10 uses a different connection mechanism
    // (StarConnectionSettings + StarPrinter) and is what Star's own
    // utilities use under the hood. Kotlin-coroutine-based.
    implementation 'com.starmicronics:stario10:1.9.0'
    // Coroutines runtime — required by stario10. The -android variant
    // provides the Main dispatcher. We use runBlocking from a Kotlin
    // bridge file to expose suspend fns to Java.
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.24'
    // Firebase Cloud Messaging on the APP compile classpath. KitchenMessagingService
    // extends the push plugin's MessagingService (a FirebaseMessagingService subclass)
    // and references RemoteMessage; the plugin exposes firebase-messaging only as
    // `implementation` (non-transitive), so we declare it here too. Pinned to the
    // plugin's version (25.0.1) to avoid a resolution conflict. Luigi 2026-06-15.
    implementation 'com.google.firebase:firebase-messaging:25.0.1'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
