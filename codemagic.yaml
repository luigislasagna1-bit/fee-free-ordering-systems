# Codemagic CI — cloud-Mac build for the Fee Free Order App (iOS).
#
# This builds the Capacitor iOS app (a WebView shell that loads the live
# kitchen at feefreeordering.com/kitchen + the native DirectPrinter plugin),
# signs it with the App Store distribution profile, and uploads it to
# TestFlight. No local Mac required.
#
# ── ONE-TIME SETUP (done in the Codemagic UI, not here) ──────────────────
#  1. Sign up at codemagic.io with the GitHub account that owns this repo and
#     add the repository.
#  2. In App Store Connect → Users and Access → Integrations → App Store
#     Connect API, create a key with access role "App Manager". Download the
#     .p8 (one time only), and note the Key ID + Issuer ID.
#  3. In Codemagic → Team settings → Integrations → Developer Portal, add that
#     key. NAME THE INTEGRATION EXACTLY:  ff-asc-key
#     (the `app_store_connect:` reference below must match this name).
#  4. Push this file; Codemagic auto-detects it and shows the "ios-kitchen"
#     workflow. Run it.
#
# Codemagic uses the API key to (a) auto-create the signing certificate +
# provisioning profile for com.feefreeordering.kitchen and (b) upload the
# build to TestFlight — so there are no certificates to manage by hand.

workflows:
  ios-kitchen:
    name: Fee Free Order App (iOS)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: ff-asc-key
    environment:
      groups:
        # Secure variable group holding IOS_SIGNING_KEY_PEM — the stored iOS
        # distribution PRIVATE KEY (full PEM, multi-line). With it present,
        # every build REUSES one certificate instead of minting a new one, so
        # we never accumulate certs against Apple's distribution-cert limit.
        # Create this group + variable in the Codemagic UI (one-time). If the
        # group/variable is absent the signing step below falls back to minting
        # a fresh cert, so the build still works either way.
        - ios_signing
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.feefreeordering.kitchen"
      node: 22
    triggering:
      # Manual builds only for now (we trigger from the Codemagic UI). We can
      # add branch/tag triggers later once the pipeline is proven.
      events: []
    scripts:
      - name: Install npm dependencies
        # `npm install` (not `npm ci`) — ci fails fast if package-lock.json is
        # even slightly out of sync with package.json; install reconciles it.
        script: npm install --no-audit --no-fund
      - name: Capacitor sync (iOS)
        # Copies the web config + native plugins into the iOS project. This is a
        # Swift Package Manager Capacitor project (ios/App/CapApp-SPM/Package.swift),
        # NOT CocoaPods — there is no Podfile; Xcode resolves the Swift packages at
        # build time, so no separate install step is needed.
        script: npx cap sync ios
      - name: Set up code signing (REUSE one cert if stored key is present)
        # CERT REUSE — stops repeat builds from piling up distribution certs
        # against Apple's limit.
        #
        # If IOS_SIGNING_KEY_PEM is set (secure var in the `ios_signing` group,
        # holding our stored distribution private key): write it out and let
        # `fetch-signing-files --create` find the matching certificate. On the
        # FIRST build it creates ONE cert from this key; EVERY build after
        # reuses it — no new certs, ever.
        #
        # If the variable is ABSENT (group not set up yet): fall back to the old
        # behavior — generate a key + mint a fresh cert — so the build still
        # works. (This path is the one that accumulates certs, so set up the
        # variable to avoid it.)
        #
        # `set -e` so any failure goes RED instead of silently passing. Note:
        # the reuse path mints NOTHING on a failed/iterating build, so retrying
        # a broken build is safe.
        script: |
          set -e
          keychain initialize
          if [ -n "$IOS_SIGNING_KEY_PEM" ]; then
            echo "Cert reuse: using stored distribution key (no new cert minted)."
            printf '%s\n' "$IOS_SIGNING_KEY_PEM" > /tmp/ff_signing_key.pem
          else
            echo "WARNING: IOS_SIGNING_KEY_PEM not set — minting a NEW distribution cert (counts against Apple's limit). Set up the ios_signing group to enable reuse."
            openssl genrsa -out /tmp/ff_signing_key.pem 2048
            app-store-connect certificates create \
              --type IOS_DISTRIBUTION \
              --certificate-key @file:/tmp/ff_signing_key.pem \
              --save
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/ff_signing_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set build number to latest TestFlight + 1
        script: |
          BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          cd ios/App
          agvtool new-version -all $((BUILD_NUMBER + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Upload to TestFlight (internal testers can install immediately). We
        # do NOT auto-submit to App Store review yet — that's a later step.
        submit_to_testflight: true
